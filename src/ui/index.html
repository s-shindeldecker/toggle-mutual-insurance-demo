<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Toggle Mutual Insurance</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        color: #1f2933;
        background: #f8f9fb;
      }
      header {
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        color: #0f2d52;
        padding: 12px 0 2px;
      }
      .container {
        max-width: 1360px;
        margin: 0 auto;
        padding: 0 16px;
      }
      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .logo {
        width: 240px;
        height: auto;
        display: block;
      }
      .logo img {
        width: 100%;
        height: auto;
        display: block;
      }
      .nav {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: flex-end;
        font-size: 14px;
        color: #ffffff;
        background: #0f2d52;
        padding: 8px 12px;
        border-radius: 10px;
      }
      .nav a {
        color: inherit;
        text-decoration: none;
        padding: 6px 8px;
        border-radius: 6px;
      }
      .nav a:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      h1 {
        font-size: 22px;
        margin: 0;
      }
      .page {
        padding: 8px 0 32px;
      }
      .card {
        background: #fff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      }
      .hero {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
        align-items: center;
      }
      .hero h2 {
        font-size: 32px;
        margin: 0 0 8px;
        color: #0f2d52;
      }
      .hero img {
        width: 100%;
        max-width: 420px;
      }
      .hero-visual {
        text-align: center;
      }
      .mascot-text {
        font-size: 18px;
        color: #1f2933;
      }
      .how-it-works {
        display: grid;
        gap: 12px;
        margin-top: 20px;
      }
      .how-it-works li {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        padding: 12px;
        border-radius: 10px;
        list-style: none;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .grid.two {
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }
      form {
        display: grid;
        gap: 12px;
      }
      label {
        font-weight: 600;
        display: grid;
        gap: 6px;
      }
      input, select {
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #d9dfe6;
        font-size: 14px;
      }
      button {
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        background: #2b6cb0;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: #e2e8f0;
        color: #1f2933;
      }
      button.ghost {
        background: transparent;
        color: #2b6cb0;
      }
      .stepper {
        display: flex;
        gap: 8px;
        font-size: 13px;
        margin-bottom: 16px;
        color: #64748b;
      }
      .stepper span.active {
        color: #0f2d52;
        font-weight: 600;
      }
      .offer-card {
        background: linear-gradient(135deg, #e0f2ff, #fff);
        border: 1px solid #cbe4ff;
        padding: 24px;
        border-radius: 14px;
        display: grid;
        gap: 6px;
      }
      .offer-price {
        font-size: 36px;
        font-weight: 700;
        color: #0f2d52;
      }
      .badge {
        background: #0f2d52;
        color: #fff;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        display: inline-block;
      }
      details {
        margin-top: 12px;
      }
      pre {
        background: #f3f4f6;
        padding: 10px;
        border-radius: 6px;
        overflow-x: auto;
      }
      .muted {
        color: #6b7280;
        font-size: 14px;
      }
      .muted.mascot-text {
        font-size: 18px;
        color: #1f2933;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .demo-control {
        background: transparent;
        color: #fff;
        border: 1px solid rgba(255,255,255,0.4);
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
      }
      .demo-control:hover {
        background: rgba(255,255,255,0.15);
        border-color: rgba(255,255,255,0.6);
      }
      .demo-panel-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15,23,42,0.25);
        z-index: 900;
      }
      .demo-panel {
        position: fixed;
        top: 0;
        right: 0;
        width: 380px;
        max-width: 90vw;
        height: 100vh;
        background: #fff;
        box-shadow: -4px 0 24px rgba(15,23,42,0.12);
        z-index: 1000;
        overflow-y: auto;
        padding: 20px;
        display: grid;
        gap: 14px;
        align-content: start;
      }
      .demo-panel h3 {
        margin: 0;
        font-size: 16px;
        color: #0f2d52;
      }
      .demo-panel-close {
        position: absolute;
        top: 12px;
        right: 12px;
        background: none;
        border: none;
        font-size: 20px;
        color: #64748b;
        cursor: pointer;
        padding: 4px 8px;
      }
      .demo-panel-section {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 12px;
        display: grid;
        gap: 6px;
      }
      .demo-panel-section h4 {
        margin: 0;
        font-size: 13px;
        color: #0f2d52;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .demo-panel-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
      }
      .demo-panel-row .label {
        color: #64748b;
      }
      .demo-panel-row .value {
        color: #1f2933;
        font-weight: 600;
        text-align: right;
        max-width: 60%;
        word-break: break-word;
      }
      .demo-panel-empty {
        color: #94a3b8;
        font-size: 14px;
        text-align: center;
        padding: 32px 16px;
      }
      .demo-panel-hint {
        color: #94a3b8;
        font-size: 11px;
        text-align: center;
      }
      .demo-panel-source {
        color: #94a3b8;
        font-size: 11px;
        font-style: italic;
        text-align: center;
        margin: 0;
      }
      .demo-panel-copy {
        background: #e2e8f0;
        color: #1f2933;
        border: none;
        padding: 8px 14px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }
      .demo-panel-copy:hover {
        background: #cbd5e1;
      }
      .demo-panel-shadow-row {
        display: grid;
        grid-template-columns: 1fr auto;
        font-size: 12px;
        gap: 4px;
        padding: 4px 0;
        border-bottom: 1px solid #e2e8f0;
      }
      .demo-panel-shadow-row:last-child {
        border-bottom: none;
      }
      .demo-panel-shadow-label {
        color: #64748b;
        font-size: 12px;
      }
      .demo-panel-shadow-values {
        text-align: right;
        font-size: 12px;
        color: #1f2933;
      }
      .demo-panel-shadow-delta {
        font-weight: 600;
        margin-left: 4px;
      }
      .delta-positive { color: #dc2626; }
      .delta-negative { color: #16a34a; }
      .delta-zero { color: #64748b; }
      .banner-image {
        width: 100%;
        max-height: 240px;
        object-fit: cover;
        object-position: center 40%;
        display: block;
        border-radius: 10px;
      }
      .hamburger {
        display: none;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        width: 36px;
        height: 36px;
        padding: 6px;
        background: #0f2d52;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      .hamburger span {
        display: block;
        width: 100%;
        height: 2px;
        background: #fff;
        border-radius: 1px;
        transition: transform 0.2s, opacity 0.2s;
      }
      .hamburger.active span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }
      .hamburger.active span:nth-child(2) {
        opacity: 0;
      }
      .hamburger.active span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }
      @media (max-width: 768px) {
        .hamburger {
          display: flex;
        }
        .brand {
          flex-wrap: wrap;
        }
        .logo {
          width: 180px;
        }
        .nav {
          display: none;
          flex-direction: column;
          width: 100%;
          gap: 4px;
          padding: 12px;
          border-radius: 0 0 10px 10px;
        }
        .nav.open {
          display: flex;
        }
        .nav a,
        .nav .demo-control {
          width: 100%;
          padding: 12px;
          box-sizing: border-box;
          text-align: left;
          font-size: 15px;
        }
        .nav .demo-control {
          margin-top: 4px;
          border-color: rgba(255,255,255,0.25);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container brand">
        <a class="logo" href="/" id="home-logo" aria-label="Toggle Mutual home">
          <img src="/assets/tomu-logo.png" alt="Toggle Mutual logo" />
        </a>
        <button type="button" class="hamburger" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <nav class="nav" id="primary-nav" aria-label="Primary">
          <a href="/" id="home-link">Home</a>
          <a href="#">Get a quote</a>
          <a href="#">Insurance & more</a>
          <a href="#">Resources</a>
          <a href="#">Claims</a>
          <a href="#">Help & support</a>
          <a href="#">Find an agent</a>
          <button type="button" id="new-user-btn" class="demo-control">New User</button>
          <button type="button" id="demo-panel-btn" class="demo-control">Demo Panel (Shift+D)</button>
        </nav>
      </div>
    </header>
    <div class="container page">
      <div id="app"></div>
    </div>
    <script>
      (function() {
        var toggle = document.getElementById('nav-toggle');
        var nav = document.getElementById('primary-nav');
        if (!toggle || !nav) return;
        toggle.addEventListener('click', function() {
          var open = nav.classList.toggle('open');
          toggle.classList.toggle('active', open);
          toggle.setAttribute('aria-expanded', String(open));
        });
        nav.addEventListener('click', function(e) {
          if (e.target.tagName === 'A') {
            nav.classList.remove('open');
            toggle.classList.remove('active');
            toggle.setAttribute('aria-expanded', 'false');
          }
        });
      })();
    </script>
    <script src="https://unpkg.com/launchdarkly-js-client-sdk@3"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
